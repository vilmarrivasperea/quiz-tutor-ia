<script>
    // Si ya hay token, redirigir al index
    if (localStorage.getItem('token')) {
        window.location.href = 'index.html';
    }

    async function login() {
        const usernameEl = document.getElementById('username');
        const passwordEl = document.getElementById('password');
        const errorEl = document.getElementById('error-msg');
        const btn = document.getElementById('btn-login');

        const username = usernameEl.value.trim();
        const password = passwordEl.value;

        errorEl.style.display = 'none';

        if (!username || !password) {
            errorEl.textContent = 'Por favor completa todos los campos.';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = 'Iniciando sesión <span class="loader"><span></span><span></span><span></span></span>';

        try {
            // Usamos ./ para asegurar que use la URL actual (Railway o Local)
            const res = await fetch('./api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = 'index.html';
            } else {
                // Intentamos leer el mensaje de error del servidor
                const errorData = await res.text();
                errorEl.textContent = errorData || 'Usuario o contraseña incorrectos';
                errorEl.style.display = 'block';
            }
        } catch(e) {
            console.error("Error en login:", e);
            errorEl.textContent = 'Error de conexión. Verifica tu internet o el estado del servidor.';
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Iniciar sesión';
        }
    }

    document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
