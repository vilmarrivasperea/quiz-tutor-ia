<script>
    // Si ya hay token, redirigir al index
    if (localStorage.getItem('token')) {
        window.location.href = 'index.html';
    }

    async function login() {
        const usernameEl = document.getElementById('username');
        const passwordEl = document.getElementById('password');
        const errorEl = document.getElementById('error-msg');
        const btn = document.getElementById('btn-login');

        const username = usernameEl.value.trim();
        const password = passwordEl.value;

        errorEl.style.display = 'none';

        if (!username || !password) {
            errorEl.textContent = 'Por favor completa todos los campos.';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = 'Iniciando sesión <span class="loader"><span></span><span></span><span></span></span>';

        try {
            // Usamos ruta relativa para que funcione en localhost y en Railway automáticamente
            const res = await fetch('./api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = 'index.html';
            } else {
                // Manejar error si data es un string o un objeto
                errorEl.textContent = typeof data === 'string' ? data : (data.message || 'Credenciales incorrectas');
                errorEl.style.display = 'block';
            }
        } catch(e) {
            console.error("Error en login:", e);
            errorEl.textContent = 'Error de conexión con el servidor. Intenta de nuevo.';
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Iniciar sesión';
        }
    }

    document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
