<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quiz Tutor IA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; color: #1e1b4b; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 20px 0; margin-bottom: 40px; }
        .header-inner { max-width: 900px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; gap: 16px; }
        .header h1 { color: white; font-size: 22px; font-weight: 800; flex: 1; }
        .header p { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 2px; }
        .username-tag { color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 500; }
        .btn-header { padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; margin-left: 8px; }
        .btn-header:hover { background: rgba(255,255,255,0.3); }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: white; border-radius: 16px; padding: 24px; border: 1px solid #e0e7ff; text-align: center; }
        .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-num { font-size: 32px; font-weight: 800; color: #4f46e5; }
        .stat-lbl { font-size: 13px; color: #6b7280; margin-top: 4px; font-weight: 500; }
        .section-title { font-size: 18px; font-weight: 700; color: #1e1b4b; margin-bottom: 16px; }
        .historial-card { background: white; border-radius: 16px; padding: 24px; border: 1px solid #e0e7ff; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
        .puntaje-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; flex-shrink: 0; }
        .puntaje-alto { background: #ecfdf5; color: #059669; }
        .puntaje-medio { background: #fef3c7; color: #d97706; }
        .puntaje-bajo { background: #fef2f2; color: #dc2626; }
        .historial-info { flex: 1; }
        .historial-tema { font-size: 15px; font-weight: 600; color: #1e1b4b; margin-bottom: 4px; }
        .historial-detalle { font-size: 13px; color: #6b7280; }
        .historial-fecha { font-size: 12px; color: #9ca3af; text-align: right; }
        .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
        .empty-state p { font-size: 16px; margin-bottom: 16px; }
        .btn-primary { padding: 12px 28px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; display: inline-block; }
        .loader-wrap { text-align: center; padding: 60px; color: #6b7280; font-size: 14px; }
        .progress-bar { height: 6px; background: #e0e7ff; border-radius: 3px; margin-top: 8px; }
        .progress-fill { height: 6px; border-radius: 3px; background: linear-gradient(90deg, #4f46e5, #7c3aed); }
        .mejora-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-left: 8px; }
        .mejora-up { background: #ecfdf5; color: #059669; }
        .mejora-down { background: #fef2f2; color: #dc2626; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <div style="flex:1">
            <h1>Mi progreso</h1>
            <p>Historial y estadísticas de aprendizaje</p>
        </div>
        <span class="username-tag" id="username-display"></span>
        <a href="/index.html" class="btn-header">Nuevo quiz</a>
        <button class="btn-header" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<div class="container">

    <div id="loading" class="loader-wrap">Cargando tu progreso...</div>

    <div id="content" style="display:none">

        <div class="stat-grid" id="stats-grid"></div>

        <p class="section-title">Historial de quizzes</p>

        <div id="historial-list"></div>

    </div>

</div>

<script>
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');

    if (!token) {
        window.location.href = '/login.html';
    } else {
        document.getElementById('username-display').textContent = username;
        loadDashboard();
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        window.location.href = '/login.html';
    }

    async function loadDashboard() {
        try {
            const res = await fetch('/api/dashboard', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            renderStats(data);
            renderHistorial(data.historial);
        } catch(e) {
            document.getElementById('loading').textContent = 'Error al cargar el dashboard.';
        }
    }

    function renderStats(data) {
        const grid = document.getElementById('stats-grid');
        const pct = data.totalPreguntas > 0 ? Math.round((data.totalCorrectas / data.totalPreguntas) * 100) : 0;
        grid.innerHTML = `
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-num">${data.totalQuizzes}</div>
                <div class="stat-lbl">Quizzes completados</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-num">${data.promedio}%</div>
                <div class="stat-lbl">Puntaje promedio</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${data.promedio}%"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-num">${data.totalCorrectas}</div>
                <div class="stat-lbl">Respuestas correctas</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-num">${pct}%</div>
                <div class="stat-lbl">Precisión total</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    }

    function renderHistorial(historial) {
        const list = document.getElementById('historial-list');
        if (!historial || historial.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <p>Aún no has completado ningún quiz</p>
                    <a href="/index.html" class="btn-primary">Hacer mi primer quiz ✨</a>
                </div>`;
            return;
        }
        list.innerHTML = historial.map((h, i) => {
            const puntajeClass = h.puntaje >= 80 ? 'puntaje-alto' : h.puntaje >= 50 ? 'puntaje-medio' : 'puntaje-bajo';
            const emoji = h.puntaje >= 80 ? '🏆' : h.puntaje >= 50 ? '👍' : '💪';
            const fecha = new Date(h.fecha).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            let mejora = '';
            if (i < historial.length - 1) {
                const diff = h.puntaje - historial[i + 1].puntaje;
                if (diff > 0) mejora = `<span class="mejora-badge mejora-up">+${diff}%</span>`;
                else if (diff < 0) mejora = `<span class="mejora-badge mejora-down">${diff}%</span>`;
            }
            return `
                <div class="historial-card">
                    <div class="puntaje-circle ${puntajeClass}">${h.puntaje}%</div>
                    <div class="historial-info">
                        <div class="historial-tema">${emoji} ${h.tema} ${mejora}</div>
                        <div class="historial-detalle">${h.correctas} de ${h.totalPreguntas} correctas</div>
                        <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${h.puntaje}%"></div></div>
                    </div>
                    <div class="historial-fecha">${fecha}</div>
                </div>`;
        }).join('');
    }
</script>
</body>
</html>
