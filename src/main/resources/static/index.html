<script>
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');
    
    // 1. Verificación de Seguridad
    if (!token) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('username-display').textContent = username;
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        window.location.href = 'login.html';
    }

    let questions = [], current = 0, score = 0, failedQ = null;

    // 2. Generar Quiz (CON TOKEN)
    async function generateQuiz() {
        const texto = document.getElementById('study-text').value.trim();
        if (!texto) { alert('Por favor pega tu texto de estudio primero.'); return; }
        const numPreguntas = parseInt(document.getElementById('num-q').value);
        
        document.getElementById('gen-load').style.display = 'block';
        document.querySelector('#s-input .btn-primary').disabled = true;

        try {
            const res = await fetch('./api/quiz/generate', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': 'Bearer ' + token // <--- Token añadido
                },
                body: JSON.stringify({ texto, numPreguntas })
            });
            
            if (!res.ok) throw new Error('Error en el servidor');
            
            questions = await res.json();
            current = 0; score = 0;
            show('s-quiz');
            showQuestion();
        } catch(e) {
            alert('Error al generar el quiz. Asegúrate de estar logueado.');
        } finally {
            document.getElementById('gen-load').style.display = 'none';
            document.querySelector('#s-input .btn-primary').disabled = false;
        }
    }

    // 3. Subir PDF (CON TOKEN)
    async function uploadPdf(input) {
        const file = input.files[0];
        if (!file) return;
        
        document.getElementById('pdf-load').style.display = 'block';
        const formData = new FormData();
        formData.append('archivo', file);

        try {
            const res = await fetch('./api/pdf/extraer', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }, // <--- Token añadido
                body: formData
            });
            
            const data = await res.json();
            if (data.texto) {
                document.getElementById('study-text').value = data.texto;
                document.getElementById('pdf-nombre').textContent = '✓ ' + file.name;
                document.getElementById('pdf-nombre').style.display = 'block';
            }
        } catch(e) {
            alert('Error al procesar el PDF.');
        } finally {
            document.getElementById('pdf-load').style.display = 'none';
            input.value = '';
        }
    }

    // 4. Aprender más (CON TOKEN)
    async function loadLearning() {
        const opciones = [...document.querySelectorAll('.checkbox-group input:checked')].map(c => c.value);
        if (!opciones.length) { alert('Elige al menos una opción.'); return; }
        
        document.getElementById('learn-load').style.display = 'block';
        try {
            const res = await fetch('./api/quiz/learn', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': 'Bearer ' + token // <--- Token añadido
                },
                body: JSON.stringify({
                    tema: failedQ.tema,
                    pregunta: failedQ.pregunta,
                    respuestaCorrecta: failedQ.opciones[failedQ.correcta],
                    opciones
                })
            });
            const data = await res.json();
            renderLearningContent(data);
        } catch(e) {
            alert('Error al cargar contenido de IA.');
        } finally {
            document.getElementById('learn-load').style.display = 'none';
            document.getElementById('retry-btn').style.display = 'block';
        }
    }

    // --- Funciones de Utilidad (Mantener igual pero verificar rutas) ---
    function show(id) {
        ['s-input','s-quiz','s-learn','s-results'].forEach(s => document.getElementById(s).classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showQuestion() {
        const q = questions[current];
        document.getElementById('progress-fill').style.width = Math.round((current / questions.length) * 100) + '%';
        document.getElementById('q-counter').textContent = `Pregunta ${current + 1} de ${questions.length}`;
        document.getElementById('q-text').textContent = q.pregunta;
        const opts = document.getElementById('opts');
        opts.innerHTML = '';
        q.opciones.forEach((op, i) => {
            const b = document.createElement('button');
            b.className = 'option'; b.textContent = op;
            b.onclick = () => checkAnswer(i, b);
            opts.appendChild(b);
        });
    }

    function checkAnswer(idx, btn) {
        const q = questions[current];
        if (idx === q.correcta) {
            btn.classList.add('correct'); score++;
            document.getElementById('feedback').innerHTML = '<div class="feedback correct">✅ ¡Correcto!</div>';
            document.getElementById('next-ctrl').style.display = 'block';
        } else {
            btn.classList.add('wrong');
            failedQ = q;
            setTimeout(() => show('s-learn'), 1000);
        }
    }

    async function guardarResultado() {
        const temas = [...new Set(questions.map(q => q.tema))].join(', ');
        await fetch('./api/dashboard/guardar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ tema: temas, totalPreguntas: questions.length, correctas: score })
        });
    }

    function nextQuestion() {
        current++;
        if (current < questions.length) showQuestion();
        else { show('s-results'); guardarResultado(); }
    }

    function restart() { window.location.reload(); }
    function retryQuestion() { show('s-quiz'); showQuestion(); }
    
    function renderLearningContent(data) {
        const container = document.getElementById('learn-content');
        container.innerHTML = '';
        if (data.explicacion) container.innerHTML += `<div class="learn-block"><b>🧠 IA:</b><br>${data.explicacion}</div>`;
        if (data.resumen) container.innerHTML += `<div class="learn-block"><b>📝 Resumen:</b><br>${data.resumen}</div>`;
        if (data.youtube) container.innerHTML += `<div class="learn-block"><b>▶️ YouTube:</b><br><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(failedQ.tema)}" target="_blank">Ver videos del tema</a></div>`;
    }
</script>
