<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Tutor IA</title>
    <style>
        /* AQUÍ ESTÁN TODOS TUS ESTILOS ORIGINALES */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; color: #1e1b4b; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 20px 0; margin-bottom: 40px; }
        .header-inner { max-width: 800px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; gap: 16px; }
        .header-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .header h1 { color: white; font-size: 24px; font-weight: 800; }
        .header p { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 2px; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; }
        .card { background: white; border-radius: 20px; padding: 32px; margin-bottom: 20px; box-shadow: 0 4px 24px rgba(79,70,229,0.08); border: 1px solid #e0e7ff; }
        textarea { width: 100%; min-height: 140px; padding: 14px 16px; border: 2px solid #e0e7ff; border-radius: 12px; font-size: 14px; resize: vertical; font-family: 'Inter', sans-serif; color: #1e1b4b; background: #f8faff; transition: border 0.2s; }
        textarea:focus { outline: none; border-color: #4f46e5; background: white; }
        select { padding: 10px 16px; border: 2px solid #e0e7ff; border-radius: 10px; font-size: 14px; background: white; cursor: pointer; color: #1e1b4b; font-family: 'Inter', sans-serif; font-weight: 500; }
        .btn { padding: 12px 28px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.35); }
        .btn-success { background: linear-gradient(135deg, #059669, #10b981); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        /* ... (resto de tus estilos de opciones, progreso, etc.) ... */
        .option { display: block; width: 100%; text-align: left; padding: 14px 18px; margin-bottom: 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: #f8faff; cursor: pointer; transition: all 0.15s; }
        .option.correct { background: #ecfdf5; border-color: #10b981; color: #065f46; }
        .option.wrong { background: #fef2f2; border-color: #ef4444; color: #991b1b; }
        .progress-fill { height: 8px; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 4px; transition: width 0.4s; }
        .progress { height: 8px; background: #e0e7ff; border-radius: 4px; }
        .loader { display: inline-flex; gap: 5px; }
        .loader span { width: 7px; height: 7px; border-radius: 50%; background: #4f46e5; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
        #s-quiz, #s-learn, #s-results { display: none; }
        .active { display: block !important; }
        .logout-btn { padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <div class="header-icon">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M14 3L25 8.5V14C25 19.5 20.5 24.5 14 26C7.5 24.5 3 19.5 3 14V8.5L14 3Z" fill="white"/></svg>
        </div>
        <div style="flex:1">
            <h1>Quiz Tutor IA</h1>
            <p>Hola, <span id="username-display"></span></p>
        </div>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<div class="container">
    <div id="s-input" class="card active">
        <div class="section-title">Pega tu texto de estudio</div>
        <textarea id="study-text" placeholder="Pega tus apuntes aquí..."></textarea>
        
        <div style="margin-top:16px;padding:16px;background:#f8faff;border:2px dashed #c7d2fe;border-radius:12px;text-align:center">
            <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="uploadPdf(this)">
            <button class="btn btn-primary" onclick="document.getElementById('pdf-input').click()">Subir PDF</button>
            <div id="pdf-load" style="display:none;margin-top:10px;">Procesando...</div>
        </div>

        <div style="margin-top: 20px;">
            <select id="num-q">
                <option value="3">3 preguntas</option>
                <option value="5" selected>5 preguntas</option>
            </select>
            <button class="btn btn-primary" onclick="generateQuiz()" id="btn-gen">Generar quiz ✨</button>
        </div>
        <div id="gen-load" style="display:none; margin-top:10px;">Generando...</div>
    </div>

    <div id="s-quiz" class="card">
        <div class="progress"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <p id="q-text" style="margin: 20px 0; font-weight: 700;"></p>
        <div id="opts"></div>
        <div id="feedback"></div>
        <button id="next-btn" class="btn btn-primary" style="display:none; margin-top:20px" onclick="nextQuestion()">Siguiente</button>
    </div>

    <div id="s-results" class="card" style="text-align:center">
        <h2>¡Quiz Terminado!</h2>
        <h1 id="final-score" style="font-size: 48px; margin: 20px 0;">0/0</h1>
        <button class="btn btn-primary" onclick="location.reload()">Nuevo Quiz</button>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';
    document.getElementById('username-display').textContent = localStorage.getItem('username');

    let questions = [], current = 0, score = 0;

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // GENERAR QUIZ CON TOKEN
    async function generateQuiz() {
        const texto = document.getElementById('study-text').value;
        const numPreguntas = document.getElementById('num-q').value;
        if(!texto) return alert("Pega un texto");

        document.getElementById('gen-load').style.display = 'block';
        
        try {
            const res = await fetch('./api/quiz/generate', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ texto, numPreguntas })
            });
            questions = await res.json();
            showStep('s-quiz');
            showQuestion();
        } catch(e) { alert("Error al conectar"); }
        document.getElementById('gen-load').style.display = 'none';
    }

    // SUBIR PDF CON TOKEN
    async function uploadPdf(input) {
        const file = input.files[0];
        const formData = new FormData();
        formData.append('archivo', file);
        document.getElementById('pdf-load').style.display = 'block';

        try {
            const res = await fetch('./api/pdf/extraer', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            const data = await res.json();
            document.getElementById('study-text').value = data.texto;
        } catch(e) { alert("Error PDF"); }
        document.getElementById('pdf-load').style.display = 'none';
    }

    function showQuestion() {
        const q = questions[current];
        document.getElementById('q-text').textContent = q.pregunta;
        document.getElementById('progress-fill').style.width = ((current/questions.length)*100) + '%';
        const opts = document.getElementById('opts');
        opts.innerHTML = '';
        q.opciones.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.textContent = opt;
            btn.onclick = () => check(i, btn);
            opts.appendChild(btn);
        });
    }

    function check(idx, btn) {
        const q = questions[current];
        if(idx === q.correcta) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            document.querySelectorAll('.option')[q.correcta].classList.add('correct');
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        current++;
        document.getElementById('next-btn').style.display = 'none';
        if(current < questions.length) showQuestion();
        else {
            showStep('s-results');
            document.getElementById('final-score').textContent = `${score}/${questions.length}`;
        }
    }

    function showStep(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
